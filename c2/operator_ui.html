<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TFN SpiderLink C2</title>
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #111118;
  --bg-tertiary: #1a1a24;
  --bg-card: #14141e;
  --accent: #00ff88;
  --accent-dim: #00aa5c;
  --text-primary: #e0e0e8;
  --text-secondary: #8888aa;
  --border: #2a2a3a;
  --threat-low: #22cc66;
  --threat-medium: #ffcc00;
  --threat-high: #ff8800;
  --threat-critical: #ff2222;
  --font-mono: 'Courier New', 'Consolas', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-mono);
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: grid;
  grid-template-rows: 48px 1fr 36px;
  grid-template-columns: 180px 1fr;
  overflow: hidden;
}
header {
  grid-column: 1 / -1;
  grid-row: 1;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 24px;
}
header .title {
  font-size: 14px;
  font-weight: bold;
  color: var(--accent);
  letter-spacing: 2px;
}
header .status-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-secondary);
}
header .status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse-dot 2s infinite;
}
header .status-dot.offline { background: var(--threat-critical); animation: none; }
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
header .counter {
  font-size: 11px;
  color: var(--text-secondary);
}
header .counter span { color: var(--accent); font-weight: bold; }
aside {
  grid-column: 1;
  grid-row: 2;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  padding: 8px 0;
  display: flex;
  flex-direction: column;
}
aside button {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 10px 16px;
  text-align: left;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s;
}
aside button:hover { color: var(--text-primary); background: var(--bg-tertiary); }
aside button.active {
  color: var(--accent);
  border-left-color: var(--accent);
  background: var(--bg-tertiary);
}
aside .spacer { flex: 1; }
aside .action-btn {
  margin: 4px 10px;
  padding: 8px;
  border: 1px solid var(--threat-critical);
  border-radius: 4px;
  color: var(--threat-critical);
  background: rgba(255,34,34,0.08);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  text-align: center;
}
aside .action-btn:hover { background: rgba(255,34,34,0.2); }
#main {
  grid-column: 2;
  grid-row: 2;
  overflow-y: auto;
  padding: 16px;
}
#ticker {
  grid-column: 1 / -1;
  grid-row: 3;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 11px;
  color: var(--threat-critical);
  overflow: hidden;
  white-space: nowrap;
}
#ticker .label {
  flex-shrink: 0;
  padding-right: 12px;
  border-right: 1px solid var(--border);
  margin-right: 12px;
  color: var(--text-secondary);
}
#ticker .scroll-text {
  display: inline-block;
  animation: scroll-ticker 30s linear infinite;
}
@keyframes scroll-ticker {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}
.panel { display: none; }
.panel.active { display: block; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}
table th {
  text-align: left;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
  font-weight: normal;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
table td {
  padding: 5px 8px;
  border-bottom: 1px solid rgba(42,42,58,0.5);
}
table tr:hover { background: var(--bg-tertiary); }
.threat-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: bold;
  text-transform: uppercase;
}
.threat-low { background: rgba(34,204,102,0.15); color: var(--threat-low); }
.threat-medium { background: rgba(255,204,0,0.15); color: var(--threat-medium); }
.threat-high { background: rgba(255,136,0,0.15); color: var(--threat-high); }
.threat-critical {
  background: rgba(255,34,34,0.2);
  color: var(--threat-critical);
  animation: flash-critical 0.8s infinite;
}
@keyframes flash-critical {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.conf-bar-bg {
  width: 60px;
  height: 6px;
  background: var(--bg-tertiary);
  border-radius: 3px;
  display: inline-block;
  vertical-align: middle;
}
.conf-bar {
  height: 100%;
  border-radius: 3px;
  background: var(--accent);
}
.btn-sm {
  padding: 2px 8px;
  font-size: 10px;
  font-family: var(--font-mono);
  border: 1px solid var(--border);
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  border-radius: 3px;
  cursor: pointer;
}
.btn-sm:hover { color: var(--accent); border-color: var(--accent); }
.btn-sm.danger { color: var(--threat-critical); border-color: var(--threat-critical); }
.btn-sm.danger:hover { background: rgba(255,34,34,0.15); }
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
}
.stat-card .label {
  font-size: 10px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.stat-card .value {
  font-size: 24px;
  font-weight: bold;
  color: var(--accent);
}
.stat-card .value.warn { color: var(--threat-medium); }
.stat-card .value.bad { color: var(--threat-critical); }
.health-ring {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 6px solid var(--bg-tertiary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: bold;
  margin: 16px auto;
}
.track-timeline {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 4px 0;
}
.track-timeline .seg {
  width: 28px;
  height: 16px;
  border-radius: 2px;
  background: var(--bg-tertiary);
  font-size: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
}
.track-timeline .seg.visited { background: rgba(0,255,136,0.3); color: var(--accent); }
.track-timeline .seg.current { background: var(--accent); color: var(--bg-primary); font-weight: bold; }
.node-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
}
.node-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px;
  font-size: 11px;
}
.node-card .node-id { color: var(--accent); font-weight: bold; margin-bottom: 4px; }
.node-card .batt { margin-top: 4px; }
.batt-bar-bg {
  width: 50px;
  height: 5px;
  background: var(--bg-tertiary);
  border-radius: 2px;
  display: inline-block;
  vertical-align: middle;
}
.batt-bar { height: 100%; border-radius: 2px; }
.link-table { font-size: 11px; }
.strike-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.strike-modal.open { display: flex; }
.strike-modal .modal-box {
  background: var(--bg-secondary);
  border: 1px solid var(--threat-critical);
  border-radius: 8px;
  padding: 20px;
  min-width: 340px;
}
.strike-modal h3 { color: var(--threat-critical); margin-bottom: 12px; font-size: 14px; }
.strike-modal select, .strike-modal textarea {
  width: 100%;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 8px;
  font-family: var(--font-mono);
  font-size: 12px;
  margin-bottom: 8px;
}
.strike-modal textarea { height: 60px; resize: vertical; }
.strike-modal .modal-actions { display: flex; gap: 8px; margin-top: 8px; }
.strike-modal .modal-actions button { flex: 1; }
.audio-ctrl { display: none; }
.section-title {
  font-size: 12px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  align-items: center;
}
.filter-bar select, .filter-bar input {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 4px 8px;
  font-family: var(--font-mono);
  font-size: 11px;
}
.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--text-secondary);
}
</style>
</head>
<body>

<header>
  <div class="title">TFN SPIDERLINK C2</div>
  <div class="status-badge">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">CONNECTING</span>
  </div>
  <div class="counter">Events: <span id="evtCount">0</span></div>
  <div class="counter">Tracks: <span id="trkCount">0</span></div>
  <div class="counter">Nodes: <span id="nodeCount">0</span></div>
</header>

<aside>
  <button class="active" onclick="switchTab('events')">EVENTS</button>
  <button onclick="switchTab('tracks')">TRACKS</button>
  <button onclick="switchTab('network')">NETWORK</button>
  <button onclick="switchTab('system')">SYSTEM</button>
  <div class="spacer"></div>
  <button class="action-btn" onclick="openStrikeModal()">STRIKE REQ</button>
</aside>

<div id="main">
  <div id="panel-events" class="panel active">
    <div class="filter-bar">
      <select id="filterThreat">
        <option value="">All Threats</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <select id="filterSegment">
        <option value="">All Segments</option>
      </select>
      <select id="filterType">
        <option value="">All Types</option>
        <option value="tracked_vehicle">Tracked Vehicle</option>
        <option value="wheeled_vehicle">Wheeled Vehicle</option>
        <option value="personnel">Personnel</option>
        <option value="unknown">Unknown</option>
      </select>
      <label style="color:var(--text-secondary);font-size:11px">
        <input type="checkbox" id="filterUnacked"> Unacked only
      </label>
    </div>
    <table id="eventsTable">
      <thead>
        <tr>
          <th>Time</th>
          <th>Threat</th>
          <th>Type</th>
          <th>Conf</th>
          <th>Node</th>
          <th>Seg</th>
          <th>Pos(m)</th>
          <th>SNR</th>
          <th>Track</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="eventsBody"></tbody>
    </table>
    <div id="eventsEmpty" class="empty-state">No events received</div>
  </div>

  <div id="panel-tracks" class="panel">
    <div class="section-title">Active Target Tracks</div>
    <div id="tracksList"></div>
    <div id="tracksEmpty" class="empty-state">No active tracks</div>
  </div>

  <div id="panel-network" class="panel">
    <div class="section-title">Mesh Network Status</div>
    <div class="stat-grid" id="netStats"></div>
    <div class="section-title" style="margin-top:16px">Nodes</div>
    <div class="node-grid" id="nodeGrid"></div>
    <div class="section-title" style="margin-top:16px">Links</div>
    <table class="link-table">
      <thead>
        <tr><th>From</th><th>To</th><th>Status</th><th>Quality</th></tr>
      </thead>
      <tbody id="linksBody"></tbody>
    </table>
  </div>

  <div id="panel-system" class="panel">
    <div class="section-title">System Status</div>
    <div class="stat-grid" id="sysStats"></div>
  </div>
</div>

<div id="ticker">
  <div class="label">ALERTS</div>
  <div class="scroll-text" id="tickerText">System initializing...</div>
</div>

<div class="strike-modal" id="strikeModal">
  <div class="modal-box">
    <h3>STRIKE REQUEST</h3>
    <label style="font-size:11px;color:var(--text-secondary);display:block;margin-bottom:4px">Event ID</label>
    <input type="text" id="strikeEventId" style="width:100%;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);border-radius:3px;padding:6px 8px;font-family:var(--font-mono);font-size:12px;margin-bottom:8px">
    <label style="font-size:11px;color:var(--text-secondary);display:block;margin-bottom:4px">Action</label>
    <select id="strikeAction">
      <option value="fpv">FPV Drone</option>
      <option value="artillery">Artillery</option>
      <option value="recon">Recon</option>
    </select>
    <textarea id="strikeNotes" placeholder="Notes..."></textarea>
    <div class="modal-actions">
      <button class="btn-sm" onclick="closeStrikeModal()">Cancel</button>
      <button class="btn-sm danger" onclick="submitStrike()">Submit</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let ws = null;
let reconnectTimer = null;
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function beep(freq, duration) {
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq || 880;
    osc.type = 'square';
    gain.gain.value = 0.1;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (duration || 0.15));
    osc.stop(audioCtx.currentTime + (duration || 0.15));
  } catch(e) {}
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/events`);
  ws.onopen = () => {
    document.getElementById('statusDot').classList.remove('offline');
    document.getElementById('statusText').textContent = 'ONLINE';
  };
  ws.onclose = () => {
    document.getElementById('statusDot').classList.add('offline');
    document.getElementById('statusText').textContent = 'OFFLINE';
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connectWS, 3000);
  };
  ws.onerror = () => { ws.close(); };
  ws.onmessage = (msg) => {
    try {
      const data = JSON.parse(msg.data);
      if (data.type === 'new_event') {
        const e = data.event;
        if (e.threat_level === 'critical') {
          beep(880, 0.2);
          setTimeout(() => beep(880, 0.2), 250);
          setTimeout(() => beep(1200, 0.3), 500);
        } else if (e.threat_level === 'high') {
          beep(660, 0.15);
        }
        updateTickerAlert(e);
      }
    } catch(err) {}
  };
}

function updateTickerAlert(e) {
  const el = document.getElementById('tickerText');
  const t = formatTime(e.timestamp);
  const txt = `[${t}] ${e.threat_level.toUpperCase()} — ${e.target_type} at ${e.segment_id} pos ${e.position_m}m [${e.event_id}]`;
  el.textContent = txt + '  |  ' + el.textContent;
}

function formatTime(ts) {
  if (!ts) return '--:--:--';
  try {
    const d = new Date(ts.replace('Z', ''));
    return d.toTimeString().slice(0, 8);
  } catch(e) { return ts.slice(11, 19); }
}

function switchTab(tab) {
  document.querySelectorAll('aside button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'events') loadEvents();
  else if (tab === 'tracks') loadTracks();
  else if (tab === 'network') loadNetwork();
  else if (tab === 'system') loadSystem();
}

async function apiFetch(path) {
  try {
    const r = await fetch(API + path);
    return await r.json();
  } catch(e) { return null; }
}

let lastEvents = [];

async function loadEvents() {
  const params = new URLSearchParams();
  params.set('limit', '50');
  const threat = document.getElementById('filterThreat').value;
  if (threat) params.set('min_threat', threat);
  const seg = document.getElementById('filterSegment').value;
  if (seg) params.set('segment', seg);
  const typ = document.getElementById('filterType').value;
  if (typ) params.set('target_type', typ);
  const unacked = document.getElementById('filterUnacked').checked;
  if (unacked) params.set('acknowledged', 'false');

  const data = await apiFetch('/api/events?' + params.toString());
  if (!data) return;
  lastEvents = data;
  document.getElementById('evtCount').textContent = data.length;
  const body = document.getElementById('eventsBody');
  const empty = document.getElementById('eventsEmpty');
  if (data.length === 0) {
    body.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const segments = new Set();
  data.forEach(e => { if (e.segment_id) segments.add(e.segment_id); });
  const segSel = document.getElementById('filterSegment');
  const curSeg = segSel.value;
  const existingOpts = new Set([...segSel.options].map(o => o.value).filter(v => v));
  segments.forEach(s => {
    if (!existingOpts.has(s)) {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      segSel.appendChild(opt);
      existingOpts.add(s);
    }
  });

  body.innerHTML = data.map(e => {
    const tl = e.threat_level || 'low';
    const conf = (e.classification_confidence || 0) * 100;
    const confColor = conf > 70 ? 'var(--accent)' : conf > 40 ? 'var(--threat-medium)' : 'var(--threat-high)';
    const ackText = e.acknowledged ? '<span style="color:var(--accent)">ACK</span>' : '';
    const typeIcons = {
      tracked_vehicle: 'T',
      wheeled_vehicle: 'W',
      personnel: 'P',
      unknown: '?'
    };
    const icon = typeIcons[e.target_type] || '?';
    return `<tr>
      <td>${formatTime(e.timestamp)}</td>
      <td><span class="threat-badge threat-${tl}">${tl}</span></td>
      <td>${icon} ${e.target_type || 'unknown'}</td>
      <td>
        <div class="conf-bar-bg"><div class="conf-bar" style="width:${conf}%;background:${confColor}"></div></div>
        <span style="font-size:10px;margin-left:4px">${conf.toFixed(0)}%</span>
      </td>
      <td>${e.source_node || '-'}</td>
      <td>${e.segment_id || '-'}</td>
      <td>${e.position_m != null ? e.position_m.toFixed(0) : '-'}</td>
      <td>${e.snr_db != null ? e.snr_db.toFixed(1) : '-'}</td>
      <td>${e.track_id || '-'}</td>
      <td>
        ${ackText}
        ${!e.acknowledged ? `<button class="btn-sm" onclick="ackEvent('${e.event_id}')">ACK</button>` : ''}
        ${tl === 'high' || tl === 'critical' ? `<button class="btn-sm danger" onclick="strikeEvent('${e.event_id}')">STRIKE</button>` : ''}
      </td>
    </tr>`;
  }).join('');
}

async function ackEvent(eid) {
  await fetch(API + '/api/events/' + eid + '/ack', { method: 'POST' });
  loadEvents();
}

function strikeEvent(eid) {
  document.getElementById('strikeEventId').value = eid;
  document.getElementById('strikeModal').classList.add('open');
}

function openStrikeModal() {
  document.getElementById('strikeEventId').value = '';
  document.getElementById('strikeModal').classList.add('open');
}

function closeStrikeModal() {
  document.getElementById('strikeModal').classList.remove('open');
}

async function submitStrike() {
  const eid = document.getElementById('strikeEventId').value;
  const action = document.getElementById('strikeAction').value;
  const notes = document.getElementById('strikeNotes').value;
  if (!eid) { alert('Event ID required'); return; }
  await fetch(API + '/api/strike-request', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ event_id: eid, action, notes })
  });
  closeStrikeModal();
  document.getElementById('strikeNotes').value = '';
}

async function loadTracks() {
  const data = await apiFetch('/api/tracks?active_only=true');
  if (!data) return;
  document.getElementById('trkCount').textContent = data.length;
  const el = document.getElementById('tracksList');
  const empty = document.getElementById('tracksEmpty');
  if (data.length === 0) { el.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  const allSegs = Array.from({length: 10}, (_, i) => `seg_${String(i + 1).padStart(2, '0')}`);
  el.innerHTML = data.map(t => {
    const dir = t.heading === 'towards_front' ? '<span style="color:var(--threat-critical)">&#x2192; FWD</span>'
              : t.heading === 'towards_rear' ? '<span style="color:var(--threat-medium)">&#x2190; REAR</span>'
              : '<span style="color:var(--text-secondary)">---</span>';
    const segSet = new Set(t.segments || []);
    const lastSeg = (t.segments || []).slice(-1)[0] || '';
    const timeline = allSegs.map(s => {
      const cls = s === lastSeg ? 'current' : segSet.has(s) ? 'visited' : '';
      return `<div class="seg ${cls}" title="${s}">${s.replace('seg_','')}</div>`;
    }).join('');
    const tl = t.max_threat || 'low';
    return `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>
          <span style="color:var(--accent);font-weight:bold">${t.track_id}</span>
          <span class="threat-badge threat-${tl}" style="margin-left:8px">${tl}</span>
          <span style="margin-left:8px;color:var(--text-secondary)">${t.target_type}</span>
        </div>
        <div style="font-size:11px;color:var(--text-secondary)">
          ${t.event_count} events | ${dir} | ${t.speed_mps != null ? t.speed_mps + ' m/s' : 'no speed'}
        </div>
      </div>
      <div style="font-size:10px;color:var(--text-secondary);margin-bottom:6px">
        First: ${formatTime(t.first_seen)} | Last: ${formatTime(t.last_seen)} | Segments: ${(t.segments||[]).join(', ')}
      </div>
      <div class="track-timeline">${timeline}</div>
    </div>`;
  }).join('');
}

async function loadNetwork() {
  const data = await apiFetch('/api/network/status');
  if (!data) return;
  const healthPct = (data.health_score * 100).toFixed(1);
  const healthColor = data.health_score > 0.8 ? 'var(--accent)' : data.health_score > 0.5 ? 'var(--threat-medium)' : 'var(--threat-critical)';
  document.getElementById('nodeCount').textContent = data.alive_nodes + '/' + data.total_nodes;
  document.getElementById('netStats').innerHTML = `
    <div class="stat-card">
      <div class="label">Network Health</div>
      <div class="health-ring" style="border-color:${healthColor};color:${healthColor}">${healthPct}%</div>
    </div>
    <div class="stat-card">
      <div class="label">Nodes Alive</div>
      <div class="value">${data.alive_nodes} / ${data.total_nodes}</div>
    </div>
    <div class="stat-card">
      <div class="label">Active Links</div>
      <div class="value">${data.active_links} / ${data.total_links}</div>
    </div>
  `;
  const ng = document.getElementById('nodeGrid');
  ng.innerHTML = (data.nodes || []).map(n => {
    const batt = n.battery_pct || 0;
    const battColor = batt > 60 ? 'var(--accent)' : batt > 30 ? 'var(--threat-medium)' : 'var(--threat-critical)';
    const statusColor = n.status === 'alive' ? 'var(--accent)' : n.status === 'degraded' ? 'var(--threat-medium)' : 'var(--threat-critical)';
    return `<div class="node-card">
      <div class="node-id">${n.node_id} <span style="color:${statusColor};font-size:9px">${n.status.toUpperCase()}</span></div>
      <div style="font-size:10px;color:var(--text-secondary)">${n.segment_id} | ${n.events_generated} events</div>
      <div class="batt">
        <span style="font-size:10px">${batt.toFixed(0)}%</span>
        <div class="batt-bar-bg"><div class="batt-bar" style="width:${batt}%;background:${battColor}"></div></div>
      </div>
    </div>`;
  }).join('');
  const lb = document.getElementById('linksBody');
  lb.innerHTML = (data.links || []).map(l => {
    const sc = l.status === 'active' ? 'var(--accent)' : l.status === 'degraded' ? 'var(--threat-medium)' : 'var(--threat-critical)';
    return `<tr>
      <td>${l.from}</td>
      <td>${l.to}</td>
      <td style="color:${sc}">${l.status.toUpperCase()}</td>
      <td>${l.quality_pct.toFixed(0)}%</td>
    </tr>`;
  }).join('');
}

async function loadSystem() {
  const data = await apiFetch('/api/system');
  if (!data) return;
  document.getElementById('sysStats').innerHTML = `
    <div class="stat-card">
      <div class="label">C2 Status</div>
      <div class="value">${data.status.toUpperCase()}</div>
    </div>
    <div class="stat-card">
      <div class="label">Uptime</div>
      <div class="value" style="font-size:18px">${data.uptime_human}</div>
    </div>
    <div class="stat-card">
      <div class="label">Events Processed</div>
      <div class="value">${data.events_processed}</div>
    </div>
    <div class="stat-card">
      <div class="label">Events Rejected (Dup)</div>
      <div class="value warn">${data.events_rejected_duplicate}</div>
    </div>
    <div class="stat-card">
      <div class="label">Events Rejected (Noise)</div>
      <div class="value warn">${data.events_rejected_noise}</div>
    </div>
    <div class="stat-card">
      <div class="label">Strike Requests</div>
      <div class="value">${data.strike_requests_total}</div>
    </div>
    <div class="stat-card">
      <div class="label">Sensors Online</div>
      <div class="value">${data.active_sensors} / ${data.total_sensors}</div>
    </div>
    <div class="stat-card">
      <div class="label">Active Tracks</div>
      <div class="value">${data.tracks_active}</div>
    </div>
    <div class="stat-card">
      <div class="label">WS Clients</div>
      <div class="value">${data.ws_clients}</div>
    </div>
    <div class="stat-card">
      <div class="label">WS Messages Sent</div>
      <div class="value">${data.ws_messages_sent}</div>
    </div>
    <div class="stat-card">
      <div class="label">Version</div>
      <div class="value" style="font-size:14px">${data.version}</div>
    </div>
  `;
}

document.getElementById('filterThreat').addEventListener('change', loadEvents);
document.getElementById('filterSegment').addEventListener('change', loadEvents);
document.getElementById('filterType').addEventListener('change', loadEvents);
document.getElementById('filterUnacked').addEventListener('change', loadEvents);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeStrikeModal();
});

connectWS();
loadEvents();

setInterval(() => {
  const active = document.querySelector('.panel.active');
  if (active && active.id === 'panel-events') loadEvents();
  else if (active && active.id === 'panel-tracks') loadTracks();
  else if (active && active.id === 'panel-network') loadNetwork();
  else if (active && active.id === 'panel-system') loadSystem();
}, 2000);
</script>
</body>
</html>
