<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Codex Controller</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Unbounded:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #0088ff;
    --warn: #ffaa00;
    --err: #ff4466;
    --text: #e0e0f0;
    --muted: #5a5a7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }

  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    margin-left: auto;
    transition: all 0.3s;
  }
  .status-dot.running { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1s infinite; }
  .status-dot.done { background: var(--accent); }
  .status-dot.error { background: var(--err); }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .status-text {
    font-size: 11px;
    color: var(--muted);
  }

  .input-area {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 12px;
    resize: none;
    outline: none;
    height: 80px;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent2); }
  textarea::placeholder { color: var(--muted); }

  .repo-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
    margin-top: 8px;
    transition: border-color 0.2s;
  }
  .repo-input:focus { border-color: var(--accent2); }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }

  .btn-run {
    background: var(--accent);
    color: #000;
    flex: 1;
  }
  .btn-run:hover { background: #00ffaa; }
  .btn-run:disabled { background: var(--muted); cursor: not-allowed; }

  .btn-stop {
    background: transparent;
    color: var(--err);
    border: 1px solid var(--err);
    padding: 10px 16px;
  }
  .btn-stop:hover { background: var(--err); color: #fff; }
  .btn-stop:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-clear {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 10px 16px;
  }
  .btn-clear:hover { border-color: var(--muted); color: var(--text); }

  .feed {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .event {
    padding: 10px 14px;
    border-radius: 8px;
    border-left: 3px solid var(--border);
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: none; } }

  .event-plan    { border-color: var(--accent2); background: rgba(0,136,255,0.06); }
  .event-execute { border-color: var(--warn);    background: rgba(255,170,0,0.06); }
  .event-result  { border-color: var(--muted);   background: rgba(255,255,255,0.03); }
  .event-done    { border-color: var(--accent);  background: rgba(0,255,136,0.08); color: var(--accent); font-weight: 600; }
  .event-error   { border-color: var(--err);     background: rgba(255,68,102,0.08); color: var(--err); }

  .event-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
    opacity: 0.6;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    padding: 40px;
    text-align: center;
  }

  .empty-icon { font-size: 40px; opacity: 0.3; }
  .empty-text { font-size: 13px; }

  .server-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
  }

  .server-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    outline: none;
  }

  .steps-counter {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }
</style>
</head>
<body>

<header>
  <div class="logo">CODEX</div>
  <span class="status-text" id="statusText">idle</span>
  <div class="status-dot" id="statusDot"></div>
</header>

<div class="input-area">
  <textarea id="goalInput" placeholder="fix failing tests&#10;add authentication to api.py&#10;refactor database module..."></textarea>
  
  <div class="server-row">
    <input class="server-input" id="serverInput" value="http://localhost:8100" placeholder="http://server:8100">
    <input class="repo-input" id="repoInput" value="/root/workspace" placeholder="/path/to/repo" style="flex:1.5">
  </div>

  <div class="btn-row">
    <button class="btn-run" id="btnRun" onclick="startLoop()">▶ RUN</button>
    <button class="btn-stop" id="btnStop" onclick="stopLoop()" disabled>■ STOP</button>
    <button class="btn-clear" onclick="clearFeed()">✕</button>
  </div>
</div>

<div class="feed" id="feed">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">⟳</div>
    <div class="empty-text">Введи задачу и нажми RUN<br>OpenCode выполнит автономно</div>
  </div>
</div>

<script>
let currentSessionId = null;
let eventSource = null;
let stepsCount = 0;

function getServer() {
  return document.getElementById('serverInput').value.replace(/\/$/, '');
}

async function startLoop() {
  const goal = document.getElementById('goalInput').value.trim();
  const repoPath = document.getElementById('repoInput').value.trim();
  
  if (!goal) { alert('Введи задачу!'); return; }
  
  clearFeed();
  stepsCount = 0;
  setStatus('running');
  
  document.getElementById('btnRun').disabled = true;
  document.getElementById('btnStop').disabled = false;
  
  try {
    const res = await fetch(`${getServer()}/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ goal, repo_path: repoPath })
    });
    
    if (!res.ok) {
      const err = await res.json();
      addEvent('error', 'ERROR', `Ошибка сервера: ${err.detail}`);
      setStatus('error');
      resetButtons();
      return;
    }
    
    const data = await res.json();
    currentSessionId = data.session_id;
    
    addEvent('plan', 'SESSION', `ID: ${currentSessionId}`);
    
    startStream(currentSessionId);
    
  } catch(e) {
    addEvent('error', 'ERROR', `Не могу подключиться к серверу: ${e.message}`);
    setStatus('error');
    resetButtons();
  }
}

function startStream(sessionId) {
  if (eventSource) eventSource.close();
  
  eventSource = new EventSource(`${getServer()}/stream/${sessionId}`);
  
  eventSource.onmessage = (e) => {
    const data = JSON.parse(e.data);
    
    if (data.type === 'stream_end') {
      eventSource.close();
      setStatus(data.status);
      resetButtons();
      return;
    }
    
    const typeMap = {
      'plan': ['plan', 'PLAN'],
      'execute': ['execute', 'EXEC'],
      'result': ['result', 'RESULT'],
      'done': ['done', 'DONE'],
      'error': ['error', 'ERROR'],
    };
    
    const [cssType, label] = typeMap[data.type] || ['result', data.type.toUpperCase()];
    
    if (data.type === 'result') stepsCount++;
    
    addEvent(cssType, `${label} · STEP ${data.step}`, data.content);
  };
  
  eventSource.onerror = () => {
    eventSource.close();
    setStatus('error');
    resetButtons();
  };
}

async function stopLoop() {
  if (!currentSessionId) return;
  
  try {
    await fetch(`${getServer()}/stop/${currentSessionId}`, { method: 'POST' });
  } catch(e) {}
  
  if (eventSource) eventSource.close();
  addEvent('error', 'STOPPED', 'Остановлено вручную');
  setStatus('idle');
  resetButtons();
}

function addEvent(type, label, content) {
  const emptyState = document.getElementById('emptyState');
  if (emptyState) emptyState.remove();
  
  const feed = document.getElementById('feed');
  const div = document.createElement('div');
  div.className = `event event-${type}`;
  div.innerHTML = `<div class="event-label">${label}</div>${escapeHtml(content)}`;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
  
  document.getElementById('statusText').textContent = 
    `${document.getElementById('statusDot').classList.contains('running') ? 'running' : 'idle'} · ${stepsCount} steps`;
}

function clearFeed() {
  document.getElementById('feed').innerHTML = `
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">⟳</div>
      <div class="empty-text">Введи задачу и нажми RUN<br>OpenCode выполнит автономно</div>
    </div>`;
  stepsCount = 0;
}

function setStatus(status) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = 'status-dot ' + status;
  text.textContent = status + (stepsCount > 0 ? ` · ${stepsCount} steps` : '');
}

function resetButtons() {
  document.getElementById('btnRun').disabled = false;
  document.getElementById('btnStop').disabled = true;
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>

</body>
</html>
