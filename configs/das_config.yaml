# TFN DAS Configuration

das:
  enabled: true
  
  interrogator:
    type: "phi_otdr"
    wavelength_nm: 1550
    pulse_width_ns: 100
    pulse_rate_hz: 1000
    spatial_resolution_m: 1.0
    max_range_km: 40
    dynamic_range_db: 30
    
  processing:
    sample_rate_hz: 1000
    fft_size: 1024
    window_function: "hanning"
    overlap_percent: 50
    noise_floor_threshold: 0.15
    
  classification:
    model: "signal_classifier_v1"
    min_confidence: 0.6
    targets:
      - name: "footstep_single"
        freq_range: [1.5, 3.0]
        amp_range: [0.15, 0.35]
        threat: "low"
      - name: "footstep_group"
        freq_range: [1.0, 4.0]
        amp_range: [0.25, 0.55]
        threat: "medium"
      - name: "wheeled_vehicle"
        freq_range: [8.0, 20.0]
        amp_range: [0.40, 0.70]
        threat: "medium"
      - name: "tracked_vehicle"
        freq_range: [2.0, 8.0]
        amp_range: [0.60, 0.95]
        threat: "high"
      - name: "artillery_fire"
        freq_range: [0.5, 3.0]
        amp_range: [0.85, 1.0]
        threat: "critical"
      - name: "explosion"
        freq_range: [0.1, 15.0]
        amp_range: [0.90, 1.0]
        threat: "critical"
      - name: "drone_hover"
        freq_range: [40.0, 80.0]
        amp_range: [0.10, 0.25]
        threat: "medium"
      - name: "ew_interference"
        freq_range: [100.0, 2000.0]
        amp_range: [0.30, 0.60]
        threat: "high"
      - name: "digging"
        freq_range: [3.0, 12.0]
        amp_range: [0.20, 0.50]
        threat: "low"
        
  terrain:
    - type: "ground"
      sensitivity_multiplier: 1.0
    - type: "road"
      sensitivity_multiplier: 0.7
    - type: "field"
      sensitivity_multiplier: 1.2
    - type: "forest"
      sensitivity_multiplier: 0.5
    - type: "trench"
      sensitivity_multiplier: 1.5
