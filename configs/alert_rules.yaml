# TFN Alert Rules

alerts:
  channels:
    - type: "telegram"
      enabled: false
      bot_token_env: "TELEGRAM_TOKEN"
      chat_id_env: "ALERT_CHAT_ID"
    - type: "webhook"
      enabled: false
      url_env: "WEBHOOK_URL"
    - type: "log"
      enabled: true
      path: "/var/log/tfn/alerts.log"

  rules:
    - name: "infantry_detected"
      condition: "target == 'footstep_group' AND confidence >= 0.7"
      severity: "medium"
      message: "РУХ ГРУТИ виявлено на {position_m}м ({confidence}%)"
      cooldown_s: 30
      
    - name: "armor_detected"
      condition: "target IN ('wheeled_vehicle', 'tracked_vehicle') AND confidence >= 0.8"
      severity: "high"
      message: "ТЕХНІКА виявлена на {position_m}м ({confidence}%)"
      cooldown_s: 60
      
    - name: "artillery_fire"
      condition: "target == 'artillery_fire'"
      severity: "critical"
      message: "АРТИЛЕРІЙСЬКИЙ ПОСТРІЛ на {position_m}м!"
      cooldown_s: 5
      
    - name: "explosion"
      condition: "target == 'explosion'"
      severity: "critical"
      message: "ВИБУХ на {position_m}м!"
      cooldown_s: 5
      
    - name: "ew_detected"
      condition: "target == 'ew_interference' AND confidence >= 0.8"
      severity: "high"
      message: "РЕБ ПЕРЕШКОДА на {position_m}м ({confidence}%)"
      cooldown_s: 120
      
    - name: "link_broken"
      condition: "event == 'link_broken'"
      severity: "critical"
      message: "ОБРИВ ВОЛОКНА на {link_id} біля {position_m}м"
      cooldown_s: 10
      
    - name: "node_offline"
      condition: "event == 'node_offline'"
      severity: "critical"
      message: "ВУЗОЛ {node_id} НЕ ДОСТУПНИЙ!"
      cooldown_s: 30
      
    - name: "battery_low"
      condition: "battery_percent < 15"
      severity: "warning"
      message: "Батарея вузла {node_id}: {battery_percent}% (залишилось {hours_left}год)"
      cooldown_s: 300
      
    - name: "trophy_intel_activity"
      condition: "source == 'trophy' AND confidence >= 0.7"
      severity: "high"
      message: "АКТИВНІСТЬ ВОРОГА на {position_m}м на трофейному кабелі ({target})"
      cooldown_s: 30

  escalation:
    - level: "warning"
      after_events: 3
      window_s: 300
      action: "повідомити_оператора"
    - level: "high"
      after_events: 5
      window_s: 300
      action: "повідомити_командира"
    - level: "critical"
      after_events: 1
      window_s: 60
      action: "повідомити_всіх"
